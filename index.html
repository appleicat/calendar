<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon/build/global/luxon.min.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap');</style>
</head>
<body class="overflow-hidden h-screen w-screen bg-white dark:bg-black text-black dark:text-white" style="font-family: 'Comfortaa'; font-weight: 700; font-size: min(3vh, 3vw);">
    <div class="bg-white/10 dark:bg-black/10 grid grid-cols-7 auto-rows-fr place-items-center place-content-center aspect-square cursor-default select-none h-full w-full">
        <div id="wd1" class="bg-black/5 dark:bg-white/10 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd2" class="bg-black/5 dark:bg-white/10 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd3" class="bg-black/5 dark:bg-white/10 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd4" class="bg-black/5 dark:bg-white/10 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd5" class="bg-black/5 dark:bg-white/10 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd6" class="bg-black/5 dark:bg-white/10 text-black/50 dark:text-white/50 h-full w-full flex place-content-center place-items-center"></div>
        <div id="wd7" class="bg-black/5 dark:bg-white/10 text-black/50 dark:text-white/50 h-full w-full flex place-content-center place-items-center"></div>
        <div id="c1"></div><div id="c2"></div><div id="c3"></div><div id="c4"></div><div id="c5"></div><div id="c6" class="text-black/50 dark:text-white/50"></div><div id="c7" class="text-black/50 dark:text-white/50"></div>
        <div id="c8"></div><div id="c9"></div><div id="c10"></div><div id="c11"></div><div id="c12"></div><div id="c13" class="text-black/50 dark:text-white/50"></div><div id="c14" class="text-black/50 dark:text-white/50"></div>
        <div id="c15"></div><div id="c16"></div><div id="c17"></div><div id="c18"></div><div id="c19"></div><div id="c20" class="text-black/50 dark:text-white/50"></div><div id="c21" class="text-black/50 dark:text-white/50"></div>
        <div id="c22"></div><div id="c23"></div><div id="c24"></div><div id="c25"></div><div id="c26"></div><div id="c27" class="text-black/50 dark:text-white/50"></div><div id="c28" class="text-black/50 dark:text-white/50"></div>
        <div id="c29"></div><div id="c30"></div><div id="c31"></div><div id="c32"></div><div id="c33"></div><div id="c34" class="text-black/50 dark:text-white/50"></div><div id="c35" class="text-black/50 dark:text-white/50"></div>
        <div id="c36"></div><div id="c37"></div>
        <div id="c38"></div>
        <div id="c39"></div>
        <div id="month" class="bg-[#ff0000]/10 dark:bg-[#ff0000]/30 h-full w-full flex place-content-center place-items-center"></div>
        <div id="year" class="bg-[#ff0000]/20 dark:bg-[#ff0000]/40 h-full w-full flex place-content-center place-items-center"></div>
        <div id="time" class="bg-[#ff0000]/30 dark:bg-[#ff0000]/50 h-full w-full flex place-content-center place-items-center"></div>
    </div>
<script>

setInterval(() => { if (luxon.DateTime.now().hour == 0 && luxon.DateTime.now().minute == 0 && luxon.DateTime.now().second == 0) {location.reload()} }, 1000);

setInterval(() => { document.getElementById('time').innerHTML = luxon.DateTime.now().setLocale('en').toLocaleString(luxon.DateTime.TIME_24_SIMPLE); }, 1000);

document.getElementById('year').innerHTML = luxon.DateTime.now().setLocale('en').year;
document.getElementById('month').innerHTML = luxon.DateTime.now().setLocale('en').monthShort.toUpperCase();

document.getElementById(`c${luxon.DateTime.now().day + luxon.DateTime.now().set({day: 0}).weekday}`).setAttribute('class', 'flex place-content-center place-items-center rounded-full aspect-square text-white bg-[#ff0000]/70');
document.getElementById(`c${luxon.DateTime.now().day + luxon.DateTime.now().set({day: 0}).weekday}`).setAttribute('style', 'height: min(13vh, 13vw);');

for (let i = 1; i <= 7; i++) { document.getElementById(`wd${i}`).innerHTML = luxon.DateTime.now().setLocale('en').set({weekday: i}).weekdayShort.toUpperCase() }
for (let i = luxon.DateTime.now().set({day: 1}).weekday; i < luxon.DateTime.now().daysInMonth + luxon.DateTime.now().set({day: 1}).weekday; i++) { document.getElementById(`c${i}`).innerHTML = i - luxon.DateTime.now().set({day: 0}).weekday; }

</script>
</body>
</html>
